<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>図書入力</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h1 class="mb-4"
    th:text="${bookId} != null ? '図書編集' : '図書登録'"></h1>

<form th:action="${bookId} != null ? @{/books/{id}(id=${bookId})} : @{/books}"
      th:object="${book}"
      method="post">

    <div class="mb-3">
        <label class="form-label">ISBN</label>
        <input type="text" class="form-control" th:field="*{isbn}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">タイトル</label>
        <input type="text" class="form-control" th:field="*{title}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">著者</label>
        <input type="text" class="form-control" th:field="*{author}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">出版日</label>
        <input type="date" class="form-control" th:field="*{publishedDate}">
    </div>

    <button type="submit" class="btn btn-success">保存</button>
    <a th:href="@{/books}" class="btn btn-secondary">戻る</a>
</form>

</body>
</html>

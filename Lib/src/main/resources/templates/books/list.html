<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>図書管理システム</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link th:href="@{/css/style.css}" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4">

    <!-- タイトル -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold m-0">
            <i class="bi bi-book-half"></i>
            図書管理システム
        </h2>

        <!-- PC用登録ボタン -->
        <a th:href="@{/books/new}" class="btn btn-primary pc-only">
            <i class="bi bi-plus-lg"></i>
            新規登録
        </a>

    </div>

    <!-- 検索 -->
    <div class="mb-4">
        <input
                type="text"
                class="form-control"
                placeholder="タイトル・著者・ISBNで検索（※未実装）">
    </div>

    <!-- ============================= -->
    <!-- PC表示 -->
    <!-- ============================= -->

    <div class="desktop-table table-responsive">

        <table class="table table-striped table-hover align-middle">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>ISBN</th>
                <th>タイトル</th>
                <th>著者</th>
                <th>出版日</th>
                <th width="170"></th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="book : ${books}">

                <td th:text="${book.id}"></td>
                <td th:text="${book.isbn}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.publishedDate}"></td>

                <td>

                    <!-- 編集 -->
                    <a
                            th:href="@{/books/{id}/edit(id=${book.id})}"
                            class="btn btn-warning btn-sm">

                        <i class="bi bi-pencil"></i>
                        編集

                    </a>

                    <!-- 削除 -->
                    <form
                            th:action="@{/books/{id}/delete(id=${book.id})}"
                            method="post"
                            class="d-inline">

                        <button
                                type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('削除しますか？');">

                            <i class="bi bi-trash"></i>
                            削除

                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- ============================= -->
    <!-- スマホ表示 -->
    <!-- ============================= -->

    <div class="mobile-card">

        <div
                class="book-card"
                th:each="book : ${books}">

            <div class="book-title"
                 th:text="${book.title}">
            </div>

            <div class="book-isbn">

                ISBN：
                <span th:text="${book.isbn}"></span>

            </div>

            <hr>

            <div class="book-info">

                <div class="mb-2">

                    <i class="bi bi-person-fill text-primary"></i>

                    <span class="ms-2"
                          th:text="${book.author}">
                    </span>

                </div>

                <div>

                    <i class="bi bi-calendar-event text-success"></i>

                    <span class="ms-2"
                          th:text="${book.publishedDate}">
                    </span>

                </div>

            </div>

            <div class="row mt-4">

                <div class="col-6">

                    <a
                            th:href="@{/books/{id}/edit(id=${book.id})}"
                            class="btn btn-warning w-100">

                        <i class="bi bi-pencil"></i>

                        編集

                    </a>

                </div>

                <div class="col-6">

                    <form
                            th:action="@{/books/{id}/delete(id=${book.id})}"
                            method="post">

                        <button
                                type="submit"
                                class="btn btn-danger w-100"
                                onclick="return confirm('削除しますか？');">

                            <i class="bi bi-trash"></i>

                            削除

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- スマホ用FAB -->

<a
        th:href="@{/books/new}"
        class="fab">

    <i class="bi bi-plus-lg"></i>

</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
